<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Velyria Roleplay - Loading</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #111; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.wallpaperscraft.com/image/single/city_night_street_137456_1920x1080.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h1 { font-size: 80px; text-transform: uppercase; letter-spacing: 10px; margin: 0; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }
        .box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3); width: 400px; text-align: center; }
        .loading-bar { width: 100%; height: 10px; background: #222; margin-top: 20px; border-radius: 5px; overflow: hidden; }
        .progress { width: 30%; height: 100%; background: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>VELYRIA</h1>
        <div class="box">
            <p>Bienvenue sur le serveur</p>
            <p style="color: #00d4ff;">Chargement des données...</p>
            <div class="loading-bar"><div class="progress"></div></div>
        </div>
    </div>
</body>
</html>
