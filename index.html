<!DOCTYPE html>
<html style="background: #080010;">
<head>
    <meta charset="utf-8">
    <title>Vélyria DarkRP - Loading</title>
    <style>
        /* Empêche le flash blanc au chargement */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #080010; overflow: hidden;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            color: white;
        }
        
        /* Fond flou et sombre pour faire ressortir le logo */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.imgur.com/8Qp4R3b.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.15) blur(10px); 
            z-index: 1;
        }

        .overlay {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2;
        }

        /* Ton logo Catbox */
        .server-logo {
            width: 280px;
            height: auto;
            /* Lueur violette assortie au logo */
            filter: drop-shadow(0 0 25px rgba(191, 0, 255, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        .welcome-text {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.5);
            margin: 30px 0 5px 0;
        }

        h1 { 
            font-size: 42px;
            text-transform: uppercase; 
            letter-spacing: 8px; 
            margin: 0; 
            font-weight: 900;
            /* Dégradé de blanc vers le violet de ton logo */
            background: linear-gradient(to bottom, #ffffff 40%, #bf00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(191, 0, 255, 0.3));
        }

        /* Texte de statut en bas de page */
        .status-box {
            position: absolute;
            bottom: 40px;
            text-align: center;
            width: 100%;
        }

        .status-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Animation de flottement fluide */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay">
        
        <img src="https://files.catbox.moe/gyfz19.png" class="server-logo" alt="Velyria Logo">

        <p class="welcome-text">Bienvenue sur</p>
        <h1>Vélyria DarkRP</h1>

    </div>

    <div class="status-box">
        <p class="status-text">Chargement des données de la cité...</p>
    </div>
</body>
</html>
