<!DOCTYPE html>
<html style="background: #080010;">
<head>
    <meta charset="utf-8">
    <title>Vélyria DarkRP - Loading</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #080010; overflow: hidden;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            color: white;
        }
        
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images2.alphacoders.com/605/605165.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.15) blur(10px); 
            z-index: 1;
        }

        .overlay {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2;
        }

        .server-logo {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(191, 0, 255, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        h1 { 
            font-size: 42px;
            text-transform: uppercase; 
            letter-spacing: 8px; 
            margin: 20px 0 0 0; 
            font-weight: 900;
            background: linear-gradient(to bottom, #ffffff 40%, #bf00ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- NOUVELLE BARRE DE PROGRESSION --- */
        .progress-container {
            margin-top: 40px;
            width: 400px;
            text-align: center;
        }

        .status-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            height: 15px; /* Évite que le texte saute */
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(191, 0, 255, 0.2);
        }

        .progress-bar {
            width: 0%; /* Commence à 0 */
            height: 100%;
            background: linear-gradient(90deg, #bf00ff, #00d4ff);
            box-shadow: 0 0 15px rgba(191, 0, 255, 0.7);
            transition: width 0.4s ease-out; /* Animation fluide */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay">
        
        <img src="https://files.catbox.moe/gyfz19.png" class="server-logo" alt="Velyria Logo">
        <h1>Vélyria DarkRP</h1>

        <div class="progress-container">
            <div id="status" class="status-text">Préparation du voyage...</div>
            <div class="progress-bg">
                <div id="bar" class="progress-bar"></div>
            </div>
        </div>

    </div>

    <script type="text/javascript">
        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode ) {
            // Optionnel : on peut afficher le nom de la map ici si tu veux
        }

        function SetStatusChanged( status ) {
            document.getElementById('status').innerHTML = status;
        }

        function SetFilesNeeded( needed ) {
            filesNeeded = needed;
        }

        var filesNeeded = 0;
        function SetFilesRemaining( remaining ) {
            if(filesNeeded > 0) {
                var progress = ((filesNeeded - remaining) / filesNeeded) * 100;
                document.getElementById('bar').style.width = progress + "%";
            }
        }
    </script>
</body>
</html>
